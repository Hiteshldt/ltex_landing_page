  <script type="text/babel" data-presets="react">
// Shared primitives — brand-matched
const { useEffect, useRef, useState } = React;

function ImgPlaceholder({ code, prompt, ratio = "4 / 3", dark = false, style = {} }) {
  return (
    <div
      className={`img-placeholder ${dark ? "dark" : ""}`}
      style={{ aspectRatio: ratio, ...style }}
    >
      <div className="ph-corner">{code}</div>
      <div className="ph-caption">
        <div style={{ opacity: 0.55, marginBottom: 8, fontSize: 9 }}>// designer prompt</div>
        {prompt}
      </div>
    </div>
  );
}

function Reveal({ children, delay = 0, as: Tag = "div", className = "", ...rest }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setTimeout(() => setVisible(true), delay);
          io.disconnect();
        }
      },
      { threshold: 0.12 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return (
    <Tag ref={ref} className={`reveal ${visible ? "in" : ""} ${className}`} {...rest}>
      {children}
    </Tag>
  );
}

function SectionHead({ code, label, title, subtitle }) {
  return (
    <div className="section-head">
      <div className="meta">
        <span className="code">{code}</span>
        <span>{label}</span>
      </div>
      <div>
        {title && <h2 className="display-l" style={{ margin: 0, maxWidth: "20ch" }}>{title}</h2>}
        {subtitle && <p className="body-l" style={{ marginTop: 20, maxWidth: "58ch" }}>{subtitle}</p>}
      </div>
    </div>
  );
}

function Counter({ to, duration = 1400, prefix = "", suffix = "", decimals = 0 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let started = false;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started) {
        started = true;
        const start = performance.now();
        const tick = (t) => {
          const p = Math.min(1, (t - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(to * eased);
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  const display = decimals > 0 ? val.toFixed(decimals) : Math.round(val).toLocaleString();
  return <span ref={ref}>{prefix}{display}{suffix}</span>;
}

// Brand logo wordmark — "leaftex bio" with green "f"
function Wordmark({ size = 24, dark = false }) {
  // size = approximate cap-height in px
  const fontSize = size;
  const ink = dark ? "#ffffff" : "#0e1116";
  const grey = dark ? "#9aa3ad" : "#9aa3ad";
  return (
    <span style={{
      fontFamily: "var(--display)",
      fontWeight: 800,
      fontSize,
      letterSpacing: "-0.04em",
      lineHeight: 1,
      display: "inline-flex",
      alignItems: "baseline",
      gap: fontSize * 0.18,
      color: ink,
    }}>
      <span>
        lea<span style={{ color: "#18C25A" }}>f</span>tex
      </span>
      <span style={{ color: grey, fontWeight: 700 }}>bio</span>
    </span>
  );
}

Object.assign(window, { ImgPlaceholder, Reveal, SectionHead, Counter, Wordmark });
  </script>

  <script type="text/babel" data-presets="react">
// Hero centerpiece: animated pseudostem cross-section.
// Each ring is a separate stroked circle drawn outermost-first; the
// inner layers naturally cover the inner part of outer rings without
// any overdraw. Active state is purely a stroke-width / opacity change.

function StemCrossSection() {
  const layers = [
    {
      id: "outer",
      name: "Outer Sheath",
      product: "Banana Fiber",
      yield: "12% — 120 kg / t",
      color: "#18C25A",
      r: 168, ringWidth: 30,
      labelAngle: -55,
      desc: "Mechanically extracted, degummed, combed. Spinner-ready bales.",
    },
    {
      id: "inner",
      name: "Inner Sheath",
      product: "Vegan Leather",
      yield: "18% — 180 kg / t",
      color: "#0c5c2e",
      r: 123, ringWidth: 46,
      labelAngle: 55,
      desc: "Fiber mats pressed and finished into supple, customizable sheets.",
    },
    {
      id: "pith",
      name: "Pith Core",
      product: "Leaf-Guard™",
      yield: "14% — 140 L / t",
      color: "#f0c429",
      r: 0, ringWidth: 0, // drawn as solid disc below
      labelAngle: 180,
      desc: "Starch-based edible coating. +40–60% produce shelf-life.",
    },
  ];

  const [active, setActive] = React.useState(0);
  const [paused, setPaused] = React.useState(false);

  React.useEffect(() => {
    if (paused) return;
    const id = setInterval(() => setActive((a) => (a + 1) % layers.length), 2400);
    return () => clearInterval(id);
  }, [paused, layers.length]);

  const cx = 200, cy = 200;
  const pithR = 78; // solid pith disc

  return (
    <div
      style={{ position: "relative", width: "100%" }}
      onMouseEnter={() => setPaused(true)}
      onMouseLeave={() => setPaused(false)}
    >
      <svg viewBox="0 0 400 420" style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#18C25A" stopOpacity="0.10" />
            <stop offset="70%" stopColor="#18C25A" stopOpacity="0" />
          </radialGradient>
        </defs>

        {/* ambient glow */}
        <circle cx={cx} cy={cy} r="180" fill="url(#bgGlow)" />

        {/* OUTER ring — drawn as a stroked circle so we don't have to mask */}
        <circle
          cx={cx} cy={cy}
          r={layers[0].r - layers[0].ringWidth / 2}
          fill="none"
          stroke={layers[0].color}
          strokeOpacity={active === 0 ? 1 : 0.32}
          strokeWidth={layers[0].ringWidth}
          style={{ transition: "stroke-opacity 500ms ease" }}
        />
        {/* OUTER ring outline (always visible, thin) */}
        <circle cx={cx} cy={cy} r={layers[0].r} fill="none" stroke={layers[0].color} strokeWidth="1.2" strokeOpacity="0.7" />
        <circle cx={cx} cy={cy} r={layers[0].r - layers[0].ringWidth} fill="none" stroke={layers[0].color} strokeWidth="1.2" strokeOpacity="0.7" />

        {/* INNER ring */}
        <circle
          cx={cx} cy={cy}
          r={layers[1].r - layers[1].ringWidth / 2}
          fill="none"
          stroke={layers[1].color}
          strokeOpacity={active === 1 ? 1 : 0.32}
          strokeWidth={layers[1].ringWidth}
          style={{ transition: "stroke-opacity 500ms ease" }}
        />
        <circle cx={cx} cy={cy} r={layers[1].r} fill="none" stroke={layers[1].color} strokeWidth="1.2" strokeOpacity="0.7" />
        <circle cx={cx} cy={cy} r={layers[1].r - layers[1].ringWidth} fill="none" stroke={layers[1].color} strokeWidth="1.2" strokeOpacity="0.7" />

        {/* PITH disc */}
        <circle
          cx={cx} cy={cy} r={pithR}
          fill={layers[2].color}
          fillOpacity={active === 2 ? 1 : 0.32}
          stroke={layers[2].color}
          strokeWidth="1.2"
          style={{ transition: "fill-opacity 500ms ease" }}
        />

        {/* center label */}
        <text x={cx} y={cy - 4} textAnchor="middle" fontFamily="Plus Jakarta Sans" fontSize="9" fontWeight="800" fill="#0e1116" letterSpacing="1">PSEUDOSTEM</text>
        <text x={cx} y={cy + 9} textAnchor="middle" fontFamily="JetBrains Mono" fontSize="7" letterSpacing="1.4" fill="#5b6470">CROSS-SECTION</text>

        {/* leader lines + labels */}
        {layers.map((l, i) => {
          const isActive = i === active;
          // anchor on the ring's mid radius (or pith mid for last)
          const midR = l.id === "pith" ? pithR / 2 : l.r - l.ringWidth / 2;
          const a = (l.labelAngle * Math.PI) / 180;
          const ax = cx + Math.cos(a) * midR;
          const ay = cy + Math.sin(a) * midR;
          // outer leader endpoint
          const outR = 192;
          const ex = cx + Math.cos(a) * outR;
          const ey = cy + Math.sin(a) * outR;
          const tx = cx + Math.cos(a) * (outR + 6);
          const ty = cy + Math.sin(a) * (outR + 6);
          const isLeft = Math.cos(a) < -0.15;
          const anchor = isLeft ? "end" : (Math.abs(Math.cos(a)) < 0.2 ? "middle" : "start");
          return (
            <g key={`ann-${l.id}`} style={{ opacity: isActive ? 1 : 0.32, transition: "opacity 400ms ease" }}>
              <line x1={ax} y1={ay} x2={ex} y2={ey} stroke={l.color} strokeWidth="1.25" />
              <circle cx={ax} cy={ay} r={isActive ? 4 : 2.8} fill="#fff" stroke={l.color} strokeWidth="1.6" style={{ transition: "r 400ms ease" }} />
              <text x={tx} y={ty - 2} textAnchor={anchor} fontFamily="JetBrains Mono" fontSize="8" letterSpacing="1.2" fill="#5b6470">{`L0${i + 1}`}</text>
              <text x={tx} y={ty + 11} textAnchor={anchor} fontFamily="Plus Jakarta Sans" fontSize="11" fontWeight="700" fill="#0e1116">{l.name}</text>
              <text x={tx} y={ty + 24} textAnchor={anchor} fontFamily="Plus Jakarta Sans" fontSize="10" fontWeight="600" fill={l.color}>→ {l.product}</text>
            </g>
          );
        })}
      </svg>

      {/* Info card — sits flush below the SVG inside the panel */}
      <div style={{
        marginTop: 12,
        background: "#ffffff",
        border: "1px solid var(--rule)",
        borderRadius: 12,
        padding: "14px 18px",
        display: "flex",
        flexDirection: "column",
        gap: 8,
        boxShadow: "0 4px 18px rgba(14,17,22,0.04)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ width: 10, height: 10, borderRadius: 2, background: layers[active].color, boxShadow: `0 0 0 4px ${layers[active].color}22`, flexShrink: 0 }} />
          <span className="label-mono" style={{ color: "var(--ink-3)" }}>LAYER 0{active + 1} / 03</span>
          <span style={{ flex: 1 }} />
          <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "var(--ink-3)" }}>{layers[active].yield}</span>
        </div>
        <div style={{ fontWeight: 800, fontSize: 17, color: "var(--ink)", letterSpacing: "-0.01em" }}>
          {layers[active].name} <span style={{ color: "var(--ink-4)", fontWeight: 600 }}>→</span> <span style={{ color: layers[active].color }}>{layers[active].product}</span>
        </div>
        <div className="body-s" style={{ margin: 0, lineHeight: 1.5 }}>{layers[active].desc}</div>
        <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
          {layers.map((l, i) => (
            <button
              key={l.id}
              onClick={() => { setActive(i); setPaused(true); }}
              style={{
                flex: 1, height: 4, borderRadius: 2, border: "none", cursor: "pointer",
                background: i === active ? l.color : "#e3e6ea",
                transition: "background 300ms ease",
                padding: 0,
              }}
              aria-label={`Show ${l.name}`}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

window.StemCrossSection = StemCrossSection;
  </script>

  <script type="text/babel" data-presets="react">

          .proc-list { grid-template-columns: 1fr !important; }
        }
      `}</style>
    </section>
  );
}

function CircleDiagram({ steps }) {
  const size = 380;
  const r = 150;
  const cx = size / 2;
  const cy = size / 2;
  return (
    <div style={{ position: "relative", width: "100%", maxWidth: size, aspectRatio: "1", margin: "0 auto" }}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", height: "100%", position: "absolute", inset: 0 }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#d6dae0" strokeWidth="1.5" strokeDasharray="4 6" />
        <circle cx={cx} cy={cy} r="62" fill="#0e1116" />
        <text x={cx} y={cy - 8} textAnchor="middle" fill="#18C25A" fontFamily="JetBrains Mono" fontSize="9" letterSpacing="2">CIRCULAR</text>
        <text x={cx} y={cy + 10} textAnchor="middle" fill="#fff" fontFamily="Plus Jakarta Sans" fontWeight="800" fontSize="16">Zero-Waste</text>
        <text x={cx} y={cy + 26} textAnchor="middle" fill="#9aa3ad" fontFamily="Plus Jakarta Sans" fontSize="10">100% Pith Utilization</text>
        {steps.map((s, i) => {
          const angle = (i / steps.length) * Math.PI * 2 - Math.PI / 2;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          return (
            <g key={s.n}>
              <circle cx={x} cy={y} r="22" fill="#fff" stroke="#18C25A" strokeWidth="2" />
              <text x={x} y={y + 5} textAnchor="middle" fill="#0e1116" fontFamily="Plus Jakarta Sans" fontWeight="800" fontSize="14">{s.n}</text>
              <text x={x} y={y + (Math.sin(angle) >= 0 ? 44 : -32)} textAnchor="middle" fill="#0e1116" fontFamily="Plus Jakarta Sans" fontWeight="700" fontSize="10">{s.t.split(' ')[0]}</text>
              <text x={x} y={y + (Math.sin(angle) >= 0 ? 56 : -20)} textAnchor="middle" fill="#5b6470" fontFamily="Plus Jakarta Sans" fontSize="9">{s.t.split(' ').slice(1).join(' ')}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

window.Process = Process;
  </script>

  <script type="text/babel" data-presets="react">
function SideRail() {
  const [active, setActive] = React.useState("top");
  React.useEffect(() => {
    const ids = ["top", "problem", "platform", "products", "process", "traceability", "impact", "team", "contact"];
    const onScroll = () => {
      let cur = "top";
      for (const id of ids) {
        const el = document.getElementById(id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight * 0.4) cur = id;
      }
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const items = [
    ["00", "Intro", "top"],
    ["01", "Problem", "problem"],
    ["02", "Platform", "platform"],
    ["03", "Products", "products"],
    ["04", "Process", "process"],
    ["05", "Trace", "traceability"],
    ["06", "Impact", "impact"],
    ["07", "Team", "team"],
  ];
  return (
    <div className="side-rail">
      {items.map(([n, label, id]) => (
        <a key={id} href={`#${id}`} className={active === id ? "active" : ""}>
          <span style={{ minWidth: 18 }}>{n}</span>
          <span>{label}</span>
        </a>
      ))}
    </div>
  );
}

function Marquee() {
  const items = [
    "Farm to Fashion",
    "Trace your thread",
    "100% pith utilization",
    "Native blockchain",
    "Made in Coimbatore",
    "Zero waste",
    "Biomaterials platform",
  ];
  const all = [...items, ...items, ...items];
  return (
    <div style={{ background: "var(--green)", color: "#fff", overflow: "hidden", padding: "16px 0" }}>
      <div className="marquee">
        {all.map((t, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 28, paddingRight: 28 }}>
            <span style={{ fontFamily: "var(--display)", fontSize: 22, fontWeight: 800, whiteSpace: "nowrap", letterSpacing: "-0.02em" }}>{t}</span>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff" }} />
          </div>
        ))}
      </div>
    </div>
  );
}

}
